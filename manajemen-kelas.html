<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Widyatika — Manajemen Kelas & Siswa." />
  <title>Kelas — Widyatika</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <style>
    /* ============================================================
       MANAJEMEN KELAS — Tambahan gaya
    ============================================================ */
    .kelas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .kelas-card {
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-lg);
      padding: 20px 22px;
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      transition: transform var(--ease-fast), box-shadow var(--ease-fast);
      position: relative;
      border-left: 4px solid var(--kelas-color, var(--clr-blue));
    }
    .kelas-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
    }
    .kelas-card__name {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--clr-navy);
      margin-bottom: 4px;
    }
    .kelas-card__meta {
      font-size: 0.85rem;
      color: var(--clr-text-muted);
      font-weight: 500;
    }
    .kelas-card__meta span {
      font-weight: 700;
      color: var(--clr-text);
    }
    .kelas-card__bar {
      margin-top: 12px;
      height: 4px;
      background: var(--clr-border);
      border-radius: 99px;
      overflow: hidden;
    }
    .kelas-card__bar-inner {
      height: 100%;
      border-radius: 99px;
      background: var(--kelas-color, var(--clr-blue));
      transition: width 0.6s ease;
    }
    .kelas-card__jumlah {
      font-size: 0.8rem;
      color: var(--clr-text-muted);
      margin-top: 8px;
    }

    /* Detail Kelas */
    .detail-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .detail-header__back {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: var(--clr-text-muted);
      font-weight: 600;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: var(--radius-md);
      transition: background var(--ease-fast);
    }
    .detail-header__back:hover {
      background: var(--clr-bg);
      color: var(--clr-text);
    }
    .detail-header__info h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--clr-navy);
      margin: 0;
    }
    .detail-header__info p {
      margin: 4px 0 0;
      color: var(--clr-text-muted);
      font-weight: 500;
    }
    .detail-header__actions {
      margin-left: auto;
      display: flex;
      gap: 10px;
    }

    /* Tabel siswa di detail */
    .student-table {
      width: 100%;
      border-collapse: collapse;
    }
    .student-table thead th {
      text-align: left;
      padding: 12px 14px;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--clr-navy);
      border-bottom: 1px solid var(--clr-border-strong);
      background: var(--clr-bg);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .student-table tbody tr:nth-child(odd) { background: #FFFFFF; }
    .student-table tbody tr:nth-child(even) { background: #F8FAFC; }
    .student-table td {
      padding: 12px 14px;
      font-size: 0.9rem;
      border-bottom: 1px solid var(--clr-border);
      vertical-align: middle;
    }
    .student-table .student-name {
      font-weight: 700;
    }

    .badge-kategori {
      display: inline-flex;
      padding: 3px 12px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.75rem;
    }
    .badge-kategori--tinggi { background: #DCFCE7; color: #15803D; }
    .badge-kategori--sedang { background: #FEF9C3; color: #A16207; }
    .badge-kategori--rendah { background: #FEE2E2; color: #B91C1C; }

    .action-btn-sm {
      padding: 5px 10px;
      border-radius: 8px;
      border: 1px solid var(--clr-border);
      background: var(--clr-surface);
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--ease-fast);
      color: var(--clr-text);
    }
    .action-btn-sm:hover {
      background: var(--clr-blue-light);
      border-color: var(--clr-blue);
    }
    .action-btn-sm--danger:hover {
      background: var(--clr-danger-light);
      border-color: var(--clr-danger);
      color: var(--clr-danger);
    }
    .action-btn-sm--success {
      background: var(--clr-success-light);
      border-color: var(--clr-success);
      color: var(--clr-success);
    }
    .action-btn-sm--success:hover {
      background: var(--clr-success);
      color: #fff;
    }

    /* Modal form */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.5);
      z-index: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--sp-6);
      opacity: 0;
      visibility: hidden;
      transition: opacity var(--ease-normal), visibility var(--ease-normal);
    }
    .modal-backdrop.is-open {
      opacity: 1;
      visibility: visible;
    }
    .modal {
      background: var(--clr-surface);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      max-height: 90vh;
      transform: scale(0.92) translateY(16px);
      transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
      overflow: hidden;
    }
    .modal-backdrop.is-open .modal {
      transform: scale(1) translateY(0);
    }
    .modal__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--sp-5) var(--sp-6);
      border-bottom: 1px solid var(--clr-border);
      flex-shrink: 0;
    }
    .modal__title {
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--clr-text);
    }
    .modal__close-btn {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-md);
      border: 1px solid var(--clr-border);
      background: transparent;
      color: var(--clr-text-muted);
      cursor: pointer;
      font-size: 1.1rem;
      transition: all var(--ease-fast);
    }
    .modal__close-btn:hover {
      background: var(--clr-bg);
      color: var(--clr-text);
    }
    .modal__body {
      padding: var(--sp-6);
      overflow-y: auto;
      flex: 1;
    }
    .modal__footer {
      padding: var(--sp-4) var(--sp-6);
      border-top: 1px solid var(--clr-border);
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      background: var(--clr-bg);
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 16px;
    }
    .form-group label {
      font-weight: 600;
      font-size: 0.9rem;
    }
    .form-group input,
    .form-group select {
      padding: 10px 14px;
      border: 1px solid var(--clr-border);
      border-radius: var(--radius-md);
      font-size: 0.95rem;
      background: var(--clr-surface);
      font-family: inherit;
    }
    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--clr-blue);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
      outline: none;
    }
    .color-options {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .color-options label {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      font-weight: 400;
      font-size: 0.85rem;
    }
    .color-options input[type="radio"] {
      appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid var(--clr-border);
      cursor: pointer;
      transition: border var(--ease-fast);
      flex-shrink: 0;
    }
    .color-options input[type="radio"]:checked {
      border-color: var(--clr-blue);
      border-width: 3px;
    }
    .color-options input[type="radio"]:checked::after {
      content: '✓';
      color: #fff;
      font-size: 0.7rem;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    @media (max-width: 820px) {
      .detail-header {
        flex-direction: column;
        align-items: flex-start;
      }
      .detail-header__actions {
        margin-left: 0;
        width: 100%;
        justify-content: flex-start;
      }
      .kelas-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
    @media (max-width: 480px) {
      .kelas-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="app-layout">

    <!-- ========== SIDEBAR ========== -->
    <aside class="sidebar" id="sidebar" role="navigation" aria-label="Menu navigasi guru">
      <div class="sidebar__brand">
        <div class="sidebar__logo-icon" aria-hidden="true">◈</div>
        <span class="sidebar__logo-text">Widy<em>atika</em></span>
      </div>
      <div class="sidebar__profile" id="sidebarProfile">
        <div class="sidebar__avatar" id="sidebarAvatar" aria-hidden="true">G</div>
        <div>
          <p class="sidebar__profile-name" id="sidebarName">Memuat...</p>
          <p class="sidebar__profile-role">Guru</p>
        </div>
      </div>
      <nav class="sidebar__nav" aria-label="Menu utama">
        <div class="sidebar__nav-group">
          <p class="sidebar__nav-label">Menu Utama</p>
          <a href="dashboard.html" class="sidebar__nav-item" id="navDashboard">
            <span class="sidebar__nav-icon" aria-hidden="true">⊞</span>
            Beranda
          </a>
          <a href="manajemen-kelas.html" class="sidebar__nav-item is-active" aria-current="page">
            <span class="sidebar__nav-icon" aria-hidden="true">⌂</span>
            Kelas
          </a>
          <a href="laporan.html" class="sidebar__nav-item" id="navLaporan">
            <span class="sidebar__nav-icon" aria-hidden="true">▤</span>
            Laporan
          </a>
        </div>
      </nav>
      <div class="sidebar__footer">
        <button class="sidebar__logout-btn" id="btnLogout" type="button" aria-label="Keluar dari akun">
          <span aria-hidden="true">⏻</span> Keluar
        </button>
      </div>
    </aside>

    <!-- ========== TOPBAR ========== -->
    <header class="topbar" role="banner">
      <div class="topbar__left">
        <button class="btn btn--ghost btn--icon" id="btnToggleSidebar" aria-label="Toggle sidebar" aria-expanded="true" style="display:none;" type="button">☰</button>
        <h1 class="topbar__page-title" id="topbarTitle">Kelas</h1>
      </div>
      <div class="topbar__right">
        <div style="font-size:0.8rem; color:var(--clr-text-muted); font-weight:500;" id="topbarDate"></div>
        <button class="topbar__icon-btn" id="btnRefreshData" aria-label="Muat ulang data" type="button" title="Refresh data">⟳</button>
      </div>
    </header>

    <!-- ========== MAIN CONTENT ========== -->
    <main class="main-content" id="mainContent" role="main">

      <!-- MODE DAFTAR KELAS -->
      <div id="modeDaftar">
        <div class="page-header">
          <div>
            <h1 class="page-header__title">Daftar Kelas</h1>
            <p class="page-header__subtitle">Kelola semua kelas dan siswa di dalamnya.</p>
          </div>
          <div class="page-header__actions">
            <button id="btnTambahKelas" class="btn btn--primary" type="button">+ Tambah Kelas</button>
          </div>
        </div>
        <div class="kelas-grid" id="kelasGrid">
          <!-- Kelas card akan dirender oleh JS -->
        </div>
      </div>

      <!-- MODE DETAIL KELAS (tersembunyi) -->
      <div id="modeDetail" style="display:none;">
        <div class="detail-header">
          <button class="detail-header__back" id="btnBackDaftar">
            <span>←</span> Kembali
          </button>
          <div class="detail-header__info">
            <h2 id="detailNamaKelas">Kelas 4A</h2>
            <p id="detailMetaKelas">Kelas 4 · 3 siswa · rata-rata 67%</p>
          </div>
          <div class="detail-header__actions">
            <button id="btnTambahSiswa" class="btn btn--primary btn--sm" type="button">+ Tambah Siswa</button>
            <button id="btnEditKelas" class="btn btn--secondary btn--sm" type="button">Edit Kelas</button>
          </div>
        </div>

        <!-- Tabel Siswa -->
        <div class="card">
          <div class="table-wrapper">
            <table class="student-table">
              <thead>
                <tr>
                  <th>Nama</th>
                  <th>Kategori</th>
                  <th>Jumlah Strategi</th>
                  <th>Jumlah Main</th>
                  <th>Aksi</th>
                </tr>
              </thead>
              <tbody id="tbodyStudents">
                <tr><td colspan="5" style="text-align:center;padding:24px;color:#64748B;">Memuat data siswa...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </main>
  </div>

  <!-- ========== MODAL TAMBAH KELAS ========== -->
  <div class="modal-backdrop" id="modalKelas" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal__header">
        <h2 class="modal__title" id="modalKelasTitle">Tambah Kelas Baru</h2>
        <button class="modal__close-btn" id="btnCloseModalKelas" type="button">✕</button>
      </div>
      <div class="modal__body">
        <form id="formKelas">
          <div class="form-group">
            <label for="inputNamaKelas">Nama Kelas</label>
            <input id="inputNamaKelas" type="text" placeholder="Contoh: Kelas 4A" required />
          </div>
          <div class="form-group">
            <label for="inputTingkat">Tingkat</label>
            <select id="inputTingkat">
              <option value="Kelas 1">Kelas 1</option>
              <option value="Kelas 2">Kelas 2</option>
              <option value="Kelas 3">Kelas 3</option>
              <option value="Kelas 4" selected>Kelas 4</option>
              <option value="Kelas 5">Kelas 5</option>
              <option value="Kelas 6">Kelas 6</option>
            </select>
          </div>
          <div class="form-group">
            <label>Warna</label>
            <div class="color-options">
              <label>
                <input type="radio" name="warna" value="#3B82F6" checked style="background:#3B82F6;" />
              </label>
              <label>
                <input type="radio" name="warna" value="#22C55E" style="background:#22C55E;" />
              </label>
              <label>
                <input type="radio" name="warna" value="#F97316" style="background:#F97316;" />
              </label>
              <label>
                <input type="radio" name="warna" value="#8B5CF6" style="background:#8B5CF6;" />
              </label>
              <label>
                <input type="radio" name="warna" value="#EF4444" style="background:#EF4444;" />
              </label>
              <label>
                <input type="radio" name="warna" value="#06B6D4" style="background:#06B6D4;" />
              </label>
              <label>
                <input type="radio" name="warna" value="#EC4899" style="background:#EC4899;" />
              </label>
            </div>
          </div>
          <input type="hidden" id="editKelasId" />
        </form>
      </div>
      <div class="modal__footer">
        <button class="btn btn--secondary" id="btnCancelModalKelas" type="button">Batal</button>
        <button class="btn btn--primary" id="btnSubmitKelas" type="button">Simpan</button>
      </div>
    </div>
  </div>

  <!-- ========== MODAL TAMBAH SISWA ========== -->
  <div class="modal-backdrop" id="modalSiswa" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal__header">
        <h2 class="modal__title" id="modalSiswaTitle">Tambah Siswa</h2>
        <button class="modal__close-btn" id="btnCloseModalSiswa" type="button">✕</button>
      </div>
      <div class="modal__body">
        <form id="formSiswa">
          <div class="form-group">
            <label for="inputNISN">NISN / Username</label>
            <input id="inputNISN" type="text" placeholder="Masukkan NISN" required />
          </div>
          <div class="form-group">
            <label for="inputNamaSiswa">Nama Lengkap</label>
            <input id="inputNamaSiswa" type="text" placeholder="Nama lengkap siswa" required />
          </div>
          <div class="form-group">
            <label for="inputPanggilan">Nama Panggilan (opsional)</label>
            <input id="inputPanggilan" type="text" placeholder="Nama panggilan" />
          </div>
          <div class="form-group">
            <label for="inputPinSiswa">PIN / Password</label>
            <input id="inputPinSiswa" type="text" placeholder="4 digit PIN" required />
          </div>
          <input type="hidden" id="editSiswaId" />
          <input type="hidden" id="siswaKelasId" />
        </form>
      </div>
      <div class="modal__footer">
        <button class="btn btn--secondary" id="btnCancelModalSiswa" type="button">Batal</button>
        <button class="btn btn--primary" id="btnSubmitSiswa" type="button">Simpan</button>
      </div>
    </div>
  </div>

  <!-- ========== TOAST ========== -->
  <div class="toast-stack" id="toastStack" aria-live="polite"></div>

  <!-- ========== SCRIPTS ========== -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"></script>
  <script type="module" src="js/supabase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/kelas.js"></script>

</body>
</html>
